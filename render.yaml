services:
  - type: web
    name: nishpaksh-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        # Replace with your actual Netlify URL after first deploy, e.g.:
        # https://nishpaksh-ai.netlify.app
        value: "https://your-site.netlify.app,http://localhost:3000"
